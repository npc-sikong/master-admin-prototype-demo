<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Swagger UI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
      background: #f5f7fa;
      color: #1f2937;
    }
    .page {
      padding: 32px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 600;
    }
    p {
      margin: 0 0 18px;
      color: #64748b;
    }
    .panel {
      max-width: 760px;
      padding: 18px 20px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      background: #fff;
      line-height: 1.8;
    }
    .tag {
      display: inline-block;
      margin-right: 8px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #ecf5ff;
      color: #409eff;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="page">
    <h2>Swagger UI</h2>
    <p>本地演示原型接口文档占位页，不连接真实后端。</p>
    <div class="panel">
      <div><span class="tag">GET</span>/getRouters</div>
      <div><span class="tag">GET</span>/getInfo</div>
      <div><span class="tag">POST</span>/login</div>
      <div><span class="tag">MOCK</span>列表、新增、修改、删除、导出均由本地 mock 接管。</div>
    </div>
  </div>
</body>
</html>
